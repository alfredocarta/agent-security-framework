version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: asf_postgres
    environment:
      POSTGRES_USER: asf_user
      POSTGRES_PASSWORD: asf_secure_password
      POSTGRES_DB: asf_registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asf_user -d asf_registry"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://asf_user:asf_secure_password@db:5432/asf_registry
      - ASF_SKIP_LLM=${ASF_SKIP_LLM:-false}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
