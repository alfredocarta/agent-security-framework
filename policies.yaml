# Detection thresholds can be overridden here.
# LLM base_url can be overridden with OLLAMA_BASE_URL env var.

agents:
  triage_agent:
    risk_level: medium
    permissions:
      - communication
  billing_agent:
    risk_level: high
    permissions:
      - read_db
      - write_db
      - issue_refund
  analytics_agent:
    risk_level: low
    permissions:
      - read_db
      - communication
      - read_docs

path_allowlist:
  # Paths listed here are excluded from ML pipeline inspection on read-only tool calls
  # (file_read, file_search, skill_read, memory_read). Write and execution tools are
  # never bypassed regardless of path.
  read_only_tools:
    - file_read
    - file_search
    - skill_read
    - memory_read
  paths:
    - /Users/alfredo/Projects/agent-security-evaluation/

detection:
  block_threshold: 0.95   # Only block on near-certainty (Stage 2 is unreliable)
  pass_threshold: 0.05    # Only pass on near-certainty (force escalation otherwise)
  stage25_dangerous_threshold: 0.5
  patterns:
    - "(?i)\\bDROP\\s+TABLE\\b"
    - "(?i)\\bDELETE\\s+FROM\\b"
    - "(?i)\\bTRUNCATE\\s+TABLE\\b"
    - "(?i)\\bDROP\\s+DATABASE\\b"
    - "(?i)\\bSHUTDOWN\\b"
    - "(?i)(;|\\s)--"
    - "(?i)\\bOR\\s+1\\s*=\\s*1\\b"
    - "(?i)\\bUNION\\s+SELECT\\b"
    - "(?i)forget\\s+(all\\s+)?(your\\s+)?(instructions|rules|policy)"
    - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
    - "(?i)root\\s+access"
    - "(?i)bypass\\s+(security|policy|rules)"

llm:
  provider: ollama           # options: lm_studio, ollama, openai_compatible
  base_url: "http://localhost:11434/v1"
  model: "gemma2:2b"
  api_key: "lm-studio"
  timeout: 10
