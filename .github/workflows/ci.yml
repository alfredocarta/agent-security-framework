name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Train classifier
        run: python train_classifier.py

      - name: Run tests
        env:
          ASF_SKIP_LLM: "true"
          ASF_MASTER_KEY: ${{ secrets.ASF_MASTER_KEY }}
        run: pytest tests/ -v
